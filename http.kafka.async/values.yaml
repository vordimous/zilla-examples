env:
  KEYSTORE_PASSWORD: generated

livenessProbePort: 7114
readinessProbePort: 7114

args: ["start", "-v", "-e", "-Pzilla.binding.kafka.client.produce.record.framing.size=1024"]

service:
  ports:
    - port: 7114
      name: http
    - port: 7143
      name: https
ingress:
  enabled: true
  ingressClassName: nginx
  host: localhost
  paths:
    - path: /
      port: 7114
      pathType: Prefix